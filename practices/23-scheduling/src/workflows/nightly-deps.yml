# Nightly Dependency Check
#
# Runs every weekday at 3 AM UTC.
# Checks for outdated dependencies and security vulnerabilities.
# Creates a GitHub issue if critical findings are detected.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Your Anthropic API key

name: Nightly Dependency Check

on:
  schedule:
    # 3 AM UTC, Monday through Friday
    - cron: '0 3 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > /tmp/audit-report.json 2>/dev/null || true
          npm outdated --json > /tmp/outdated-report.json 2>/dev/null || true

          # Check severity counts
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' /tmp/audit-report.json 2>/dev/null || echo "0")
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' /tmp/audit-report.json 2>/dev/null || echo "0")
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"

      - name: Analyze with Claude
        if: steps.audit.outputs.critical != '0' || steps.audit.outputs.high != '0'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            Analyze the dependency audit results for this repository.

            The npm audit found ${{ steps.audit.outputs.critical }} critical and ${{ steps.audit.outputs.high }} high vulnerabilities.

            Read the audit report at /tmp/audit-report.json and the outdated packages at /tmp/outdated-report.json.

            For each vulnerability:
            1. Assess the real-world impact on THIS project
            2. Check if the vulnerable code path is actually used
            3. Suggest a fix (upgrade, replace, or ignore with justification)

            Create a GitHub issue with the analysis:

            gh issue create \
              --title "🔒 Security: ${{ steps.audit.outputs.critical }} critical, ${{ steps.audit.outputs.high }} high vulnerabilities ($(date +%Y-%m-%d))" \
              --label "security,dependencies" \
              --body "YOUR_ANALYSIS_HERE"

            Format the issue body with:
            - Summary of findings
            - Impact assessment for each vulnerability
            - Recommended actions (prioritized)
            - Commands to fix each issue

          allowed_tools: "Read,Grep,Glob,Bash"
          max_turns: 15

      - name: Report clean status
        if: steps.audit.outputs.critical == '0' && steps.audit.outputs.high == '0'
        run: |
          echo "✅ No critical or high vulnerabilities found."
          echo "Last check: $(date)" >> /tmp/dep-health.log
