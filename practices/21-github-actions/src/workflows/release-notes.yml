# Release Notes Generation with Claude Code
#
# Triggers when a new tag is pushed (v*.*.*)
# Claude analyzes commits since the last tag and generates release notes.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Your Anthropic API key
#
# Installation:
#   1. Copy this file to .github/workflows/claude-release-notes.yml
#   2. Add ANTHROPIC_API_KEY to repo Settings > Secrets

name: Claude Release Notes

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tag comparison

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $PREV_TAG"

      - name: Generate Release Notes with Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            Generate release notes for tag ${{ github.ref_name }}.

            Previous tag: "${{ steps.prev_tag.outputs.tag }}"

            Steps:
            1. Get the commit log between the previous tag and this tag:
               git log ${{ steps.prev_tag.outputs.tag }}..${{ github.ref_name }} --oneline
            2. For each significant commit, read the relevant files to understand the change
            3. Group changes into categories:
               - ✨ New Features
               - 🐛 Bug Fixes
               - ⚡ Performance Improvements
               - 🔒 Security Updates
               - 📝 Documentation
               - 🔧 Internal Changes
            4. Write user-friendly descriptions (not just commit messages)
            5. Highlight breaking changes prominently

            Create a GitHub release with the notes:

            gh release create "${{ github.ref_name }}" \
              --title "Release ${{ github.ref_name }}" \
              --notes "YOUR_RELEASE_NOTES_HERE"

            If there's no previous tag, generate notes based on all commits.

          allowed_tools: "Read,Grep,Glob,Bash"
          max_turns: 20
